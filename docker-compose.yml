services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cubitax
      POSTGRES_USER: cubitax
      POSTGRES_PASSWORD: cubitax
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cubitax -d cubitax"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cubitax-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cubitax-network

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/cubitax_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cubitax-network

  chromadb:
    image: chromadb/chroma:0.5.0
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/chroma
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1').read()",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cubitax-network

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    volumes:
      - uploads-data:/app/uploads
      - reports-data:/app/generated_reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cubitax-network

  celery-worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: celery -A app.tasks.celery_tasks.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - uploads-data:/app/uploads
    networks:
      - cubitax-network

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: celery -A app.tasks.celery_tasks.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cubitax-network

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      HOST: 0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cubitax-network

volumes:
  postgres-data:
  neo4j-data:
  chroma-data:
  uploads-data:
  reports-data:

networks:
  cubitax-network:
    name: cubitax-network
