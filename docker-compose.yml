# ──────────────────────────────────────────────────────────────────────
# CubitaxAI — Docker Compose (Production)
# Usage: docker compose --env-file .env.docker up -d --build
# ──────────────────────────────────────────────────────────────────────

services:
  # ── Infrastructure ─────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: cubitax
      POSTGRES_USER: cubitax
      POSTGRES_PASSWORD: cubitax
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cubitax -d cubitax"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cubitax_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - cubitax_net

  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/cubitax_neo4j
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cubitax_net

  chromadb:
    image: chromadb/chroma:0.5.0
    restart: unless-stopped
    environment:
      IS_PERSISTENT: "TRUE"
      PERSIST_DIRECTORY: /chroma/chroma
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cubitax_net

  # ── Application Services ──────────────────────────────────────────

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PYTHONPATH: /app
      UPLOAD_DIR: /app/uploads
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - reports_data:/app/generated_reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cubitax_net

  celery-worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PYTHONPATH: /app
      UPLOAD_DIR: /app/uploads
    command: celery -A app.tasks.celery_tasks.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      chromadb:
        condition: service_started
    volumes:
      - uploads_data:/app/uploads
    networks:
      - cubitax_net

  celery-beat:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env.docker
    environment:
      PYTHONPATH: /app
    command: celery -A app.tasks.celery_tasks.celery_app beat --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cubitax_net

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cubitax_net

# ── Volumes ──────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  chromadb_data:
  uploads_data:
  reports_data:

# ── Networks ─────────────────────────────────────────────────────────

networks:
  cubitax_net:
    name: cubitax_net
